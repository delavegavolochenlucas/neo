<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo — Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #1a1a1a;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .card p {
      font-size: 14px;
      color: #888;
    }

    input[type="password"] {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #0066ff;
    }

    button {
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #0052cc;
    }

    .erro {
      font-size: 13px;
      color: #cc3300;
    }
  </style>
</head>
<body>

  <header>
    <h1>Neo</h1>
    <p>Seu parceiro de disciplina e consistência</p>
  </header>

  <main>
    <form class="card" method="POST" action="/login">
      <h2>Acesso restrito</h2>
      <p>Digite a senha para continuar.</p>
      <input type="password" name="senha" placeholder="Senha" autofocus />
      {% if erro %}
        <span class="erro">{{ erro }}</span>
      {% endif %}
      <button type="submit">Entrar</button>
    </form>
  </main>

</body>
</html>
