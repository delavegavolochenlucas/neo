<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #1a1a1a;
    }

    /* Cabeçalho fixo no topo */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    /* Área de mensagens — ocupa todo o espaço disponível e rola */
    #mensagens {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Bolha de mensagem base */
    .mensagem {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    /* Mensagem do usuário — direita, azul */
    .mensagem.usuario {
      align-self: flex-end;
      background: #0066ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Mensagem do agente — esquerda, branca */
    .mensagem.agente {
      align-self: flex-start;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    /* Indicador de carregamento enquanto aguarda resposta */
    .mensagem.carregando {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
      color: #aaa;
      font-style: italic;
    }

    /* Área de input fixada no rodapé */
    #input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input-texto {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #input-texto:focus {
      border-color: #0066ff;
    }

    #btn-enviar {
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    #btn-enviar:hover {
      background: #0052cc;
    }

    /* Desabilitado durante o carregamento */
    #btn-enviar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-encerrar {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #btn-encerrar:hover {
      border-color: #cc3300;
      color: #cc3300;
    }

    /* Overlay de encerramento */
    #overlay-encerrar {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #overlay-encerrar.visivel {
      display: flex;
    }

    .card-encerrar {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 16px;
    }

    .card-encerrar h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .card-encerrar p {
      font-size: 14px;
      color: #555;
    }

    #input-estudado {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #input-estudado:focus {
      border-color: #0066ff;
    }

    .card-encerrar .acoes {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    #btn-cancelar-enc {
      background: none;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      color: #555;
      transition: border-color 0.15s;
    }

    #btn-cancelar-enc:hover {
      border-color: #aaa;
    }

    #btn-confirmar-enc {
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #btn-confirmar-enc:hover {
      background: #0052cc;
    }

    #btn-confirmar-enc:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .mensagem-encerramento {
      text-align: center;
      font-size: 15px;
      color: #555;
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <header style="display:flex; align-items:center; justify-content:space-between;">
    <div>
      <h1>Neo</h1>
      <p>Seu parceiro de disciplina e consistência</p>
    </div>
    <button id="btn-encerrar">Encerrar sessão</button>
  </header>

  <div id="overlay-encerrar">
    <div class="card-encerrar">
      <h2>Encerrar sessão</h2>
      <p>O que você estudou ou fez de produtivo nessa sessão?</p>
      <textarea id="input-estudado" rows="4" placeholder="Ex: revisei capítulo 3 de algoritmos e fiz 2 exercícios de frontend"></textarea>
      <div class="acoes">
        <button id="btn-cancelar-enc">Cancelar</button>
        <button id="btn-confirmar-enc">Salvar e encerrar</button>
      </div>
    </div>
  </div>

  <!-- Área onde as mensagens aparecem -->
  <div id="mensagens"></div>

  <!-- Campo de texto e botão de envio -->
  <div id="input-area">
    <textarea
      id="input-texto"
      placeholder="Digite sua mensagem..."
      rows="1"
    ></textarea>
    <button id="btn-enviar">Enviar</button>
  </div>

  <script>
    const areaMensagens = document.getElementById("mensagens");
    const inputTexto = document.getElementById("input-texto");
    const btnEnviar = document.getElementById("btn-enviar");

    // Adiciona uma bolha de mensagem na área de chat e rola para o final
    function adicionarMensagem(texto, tipo) {
      const div = document.createElement("div");
      div.classList.add("mensagem", tipo);
      div.textContent = texto;
      areaMensagens.appendChild(div);
      areaMensagens.scrollTop = areaMensagens.scrollHeight;
      return div;
    }

    // Envia a mensagem para o servidor e exibe a resposta
    async function enviarMensagem() {
      const texto = inputTexto.value.trim();
      if (!texto) return;

      // Exibe a mensagem do usuário imediatamente
      adicionarMensagem(texto, "usuario");
      inputTexto.value = "";
      inputTexto.style.height = "auto";

      // Desabilita o input enquanto aguarda resposta
      btnEnviar.disabled = true;
      inputTexto.disabled = true;

      // Mostra indicador de carregamento
      const bolhaCarregando = adicionarMensagem("Digitando...", "carregando");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensagem: texto }),
        });

        const data = await res.json();

        // Remove o indicador e exibe a resposta real
        bolhaCarregando.remove();

        if (data.resposta) {
          adicionarMensagem(data.resposta, "agente");
        } else {
          adicionarMensagem("Erro: " + (data.erro || "resposta inválida"), "agente");
        }
      } catch (err) {
        bolhaCarregando.remove();
        adicionarMensagem("Erro de conexão com o servidor.", "agente");
      }

      // Reabilita o input e foca nele
      btnEnviar.disabled = false;
      inputTexto.disabled = false;
      inputTexto.focus();
    }

    // Clique no botão envia a mensagem
    btnEnviar.addEventListener("click", enviarMensagem);

    // Enter envia, Shift+Enter quebra linha
    inputTexto.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        enviarMensagem();
      }
    });

    // Expande o textarea automaticamente conforme o usuário digita
    inputTexto.addEventListener("input", () => {
      inputTexto.style.height = "auto";
      inputTexto.style.height = inputTexto.scrollHeight + "px";
    });

    const overlay = document.getElementById("overlay-encerrar");
    const inputEstudado = document.getElementById("input-estudado");
    const btnConfirmar = document.getElementById("btn-confirmar-enc");

    document.getElementById("btn-encerrar").addEventListener("click", () => {
      overlay.classList.add("visivel");
      inputEstudado.focus();
    });

    document.getElementById("btn-cancelar-enc").addEventListener("click", () => {
      overlay.classList.remove("visivel");
      inputEstudado.value = "";
    });

    btnConfirmar.addEventListener("click", async () => {
      const estudado = inputEstudado.value.trim();
      if (!estudado) {
        inputEstudado.focus();
        return;
      }

      btnConfirmar.disabled = true;
      btnConfirmar.textContent = "Salvando...";

      try {
        const res = await fetch("/encerrar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ estudado }),
        });
        if (res.ok) {
          overlay.innerHTML = `<div class="card-encerrar">
            <p class="mensagem-encerramento">Sessão registrada. Até a próxima!</p>
          </div>`;
          setTimeout(() => { window.location.href = "/login"; }, 1800);
        } else {
          btnConfirmar.disabled = false;
          btnConfirmar.textContent = "Salvar e encerrar";
        }
      } catch {
        btnConfirmar.disabled = false;
        btnConfirmar.textContent = "Salvar e encerrar";
      }
    });
  </script>

</body>
</html>
