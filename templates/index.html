<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #1a1a1a;
    }

    /* Cabeçalho fixo no topo */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    /* Área de mensagens — ocupa todo o espaço disponível e rola */
    #mensagens {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Bolha de mensagem base */
    .mensagem {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    /* Mensagem do usuário — direita, azul */
    .mensagem.usuario {
      align-self: flex-end;
      background: #0066ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Mensagem do agente — esquerda, branca */
    .mensagem.agente {
      align-self: flex-start;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    /* Indicador de carregamento enquanto aguarda resposta */
    .mensagem.carregando {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
      color: #aaa;
      font-style: italic;
    }

    /* Área de input fixada no rodapé */
    #input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input-texto {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #input-texto:focus {
      border-color: #0066ff;
    }

    #btn-enviar {
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    #btn-enviar:hover {
      background: #0052cc;
    }

    /* Desabilitado durante o carregamento */
    #btn-enviar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <header>
    <h1>Agente</h1>
    <p>Seu parceiro de disciplina e consistência</p>
  </header>

  <!-- Área onde as mensagens aparecem -->
  <div id="mensagens"></div>

  <!-- Campo de texto e botão de envio -->
  <div id="input-area">
    <textarea
      id="input-texto"
      placeholder="Digite sua mensagem..."
      rows="1"
    ></textarea>
    <button id="btn-enviar">Enviar</button>
  </div>

  <script>
    const areaMensagens = document.getElementById("mensagens");
    const inputTexto = document.getElementById("input-texto");
    const btnEnviar = document.getElementById("btn-enviar");

    // Adiciona uma bolha de mensagem na área de chat e rola para o final
    function adicionarMensagem(texto, tipo) {
      const div = document.createElement("div");
      div.classList.add("mensagem", tipo);
      div.textContent = texto;
      areaMensagens.appendChild(div);
      areaMensagens.scrollTop = areaMensagens.scrollHeight;
      return div;
    }

    // Envia a mensagem para o servidor e exibe a resposta
    async function enviarMensagem() {
      const texto = inputTexto.value.trim();
      if (!texto) return;

      // Exibe a mensagem do usuário imediatamente
      adicionarMensagem(texto, "usuario");
      inputTexto.value = "";
      inputTexto.style.height = "auto";

      // Desabilita o input enquanto aguarda resposta
      btnEnviar.disabled = true;
      inputTexto.disabled = true;

      // Mostra indicador de carregamento
      const bolhaCarregando = adicionarMensagem("Digitando...", "carregando");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensagem: texto }),
        });

        const data = await res.json();

        // Remove o indicador e exibe a resposta real
        bolhaCarregando.remove();

        if (data.resposta) {
          adicionarMensagem(data.resposta, "agente");
        } else {
          adicionarMensagem("Erro: " + (data.erro || "resposta inválida"), "agente");
        }
      } catch (err) {
        bolhaCarregando.remove();
        adicionarMensagem("Erro de conexão com o servidor.", "agente");
      }

      // Reabilita o input e foca nele
      btnEnviar.disabled = false;
      inputTexto.disabled = false;
      inputTexto.focus();
    }

    // Clique no botão envia a mensagem
    btnEnviar.addEventListener("click", enviarMensagem);

    // Enter envia, Shift+Enter quebra linha
    inputTexto.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        enviarMensagem();
      }
    });

    // Expande o textarea automaticamente conforme o usuário digita
    inputTexto.addEventListener("input", () => {
      inputTexto.style.height = "auto";
      inputTexto.style.height = inputTexto.scrollHeight + "px";
    });
  </script>

</body>
</html>
