services:
  - type: web
    name: neo
    runtime: python
    rootDir: neo
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEO_PASSWORD
        sync: false
      - key: NEO_SECRET_KEY
        sync: false
